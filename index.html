<!DOCTYPE html>
<html>

<head>
    <title>💓HAPPY BIRTHDAY CHINNODA💓</title>
    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', 'Poppins', 'Segoe UI', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: white;
        }

        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #countdown {
            font-size: 40px;
            margin-top: 20px;
        }

        iframe {
            width: 100%;
            height: 100vh;
            border: none;
            display: none;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
        }

        #balloonContainer {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            top: 0;
            left: 0;
            overflow: hidden;
            display: none;
        }

        .balloon {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 55px;
            background: red;
            border-radius: 50%;
            animation: floatUp 4s ease-in forwards;
        }

        .balloon::after {
            content: "";
            position: absolute;
            width: 2px;
            height: 40px;
            background: #555;
            left: 50%;
            top: 55px;
        }

        @keyframes floatUp {
            to {
                transform: translateY(-110vh);
            }
        }

        /* 💥 Burst effect */
        .burst {
            position: absolute;
            width: 10px;
            height: 10px;
            background: yellow;
            border-radius: 50%;
            animation: explode 0.8s ease-out forwards;
        }

        @keyframes explode {
            to {
                transform: scale(6) translate(var(--x), var(--y));
                opacity: 0;
            }
        }

        /* 🌟 Stylish Reveal Message */
        #revealMessage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        .message-box {
            text-align: center;
            color: white;
            background: linear-gradient(135deg, #ec92b0, #d9c2ca);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 64, 129, 0.8);
            animation: zoomIn 1s ease;
        }

        .message-box h1 {
            margin: 0;
            font-size: 36px;
        }

        .message-box p {
            font-size: 20px;
            margin: 10px 0;
        }

        .message-box .sub {
            font-size: 16px;
            opacity: 0.9;
        }

        /* ✨ Animation */
        @keyframes zoomIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .container {
            min-height: 100vh;
        }

        iframe {
            width: 100%;
            height: 100vh;
            border: none;
            display: none;
        }

        html,
        body {
            height: auto;
            overflow-x: hidden;
            overflow-y: auto;
        }
    </style>
</head>

<body>
    <div id="balloonContainer"></div>

    <div id="revealMessage">
        <div class="message-box">
            <h1>Happy Birthday Sirisha 🌸</h1>
            <p>You are my world... CHINNODA💓 </p>
            <p class="sub">today is all about you 💕</p>
        </div>
    </div>

    <div class="container" id="countdownContainer">
        <div class="title">🎁 HAPPY BIRTHDAY CHINNODA 🎉</div>
        <div id="countdown"></div>
    </div>

    <!-- Your Birthday Page -->
    <iframe id="birthdayPage" src="birthday.html"></iframe>

    <script>
        // 🎯 SET TARGET DATE (IMPORTANT)
        const targetDate = new Date("June 28, 2026 00:00:00").getTime();

        // 🧪 TEST MODE (change minutes for testing)
        // const targetDate = new Date().getTime() + (10 * 1000); // 10 seconds test

        const countdownEl = document.getElementById("countdown");
        const countdownContainer = document.getElementById("countdownContainer");
        const birthdayPage = document.getElementById("birthdayPage");
        const revealMessage = document.getElementById("revealMessage");


        const timer = setInterval(function () {

            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance <= 0) {
                clearInterval(timer);

                // 🎈 Launch balloons first
                launchBalloons();

                setTimeout(() => {
                    revealMessage.style.opacity = "1";
                    revealMessage.style.pointerEvents = "auto";
                }, 500);

                // Hide countdown
                countdownContainer.style.display = "none";

                // Show birthday page
                birthdayPage.style.display = "block";

                // 🎉 Optional alert blast

                // ⏳ After message, show page
                setTimeout(() => {
                    revealMessage.style.opacity = "0";

                    setTimeout(() => {
                        countdownContainer.style.display = "none";

                        // 👉 SHOW iframe ONLY HERE
                        birthdayPage.style.display = "block";

                        // allow scroll now
                        document.body.style.overflow = "auto";

                    }, 1000);
                    revealMessage.style.display = "none";
                }, 3000);


                return;
            }

            // Time calculations
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((distance / (1000 * 60)) % 60);
            const seconds = Math.floor((distance / 1000) % 60);

            countdownEl.innerHTML =
                `${days}d ${hours}h ${minutes}m ${seconds}s`;

        }, 1000);

        const balloonContainer = document.getElementById("balloonContainer");

        // 🎈 Create balloons
        function launchBalloons() {
            balloonContainer.style.display = "block";

            for (let i = 0; i < 15; i++) {
                const balloon = document.createElement("div");
                balloon.className = "balloon";
                balloon.style.left = Math.random() * 100 + "%";
                balloon.style.background =
                    ["#ff4081", "#ffc107", "#4caf50", "#2196f3", "#9c27b0"][
                    Math.floor(Math.random() * 5)
                    ];

                balloonContainer.appendChild(balloon);

                // 💥 Burst after floating
                setTimeout(() => burst(balloon), 3000);
            }
        }

        // 💥 Burst function
        function burst(balloon) {
            const rect = balloon.getBoundingClientRect();

            for (let i = 0; i < 12; i++) {
                const piece = document.createElement("div");
                piece.className = "burst";

                piece.style.left = rect.left + "px";
                piece.style.top = rect.top + "px";

                piece.style.setProperty("--x", (Math.random() - 0.5) * 200 + "px");
                piece.style.setProperty("--y", (Math.random() - 0.5) * 200 + "px");

                balloonContainer.appendChild(piece);

                setTimeout(() => piece.remove(), 800);
            }

            balloon.remove();
        }
    </script>

</body>

</html>
